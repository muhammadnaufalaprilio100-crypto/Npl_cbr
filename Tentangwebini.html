nav {
    overflow-x: auto;      /* Supaya bisa geser kiri-kanan */
    white-space: nowrap;   /* Supaya menu tidak turun ke bawah */
    display: block;
}

nav ul {
    list-style: none;

    display: inline-flex;  /* Biar semua menu tetap 1 baris */

    <style>
        /* Gaya Ikon Hamburger (3 garis putih) */
.menu-icon {
  cursor: pointer;
  display: inline-block;
  padding: 10px;
}

.menu-icon span {
  display: block;
  width: 25px;
  height: 3px;
  background-color: white;
  margin: 5px 0;
}

/* Gaya Sidebar */
.sidebar {
  height: 100%;
  width: 0; /* Awalnya lebar 0 (tersembunyi) */
  position: fixed;
  z-index: 1;
  top: 0;
  left: 0;
  background-color: #111;
  overflow-x: hidden;
  transition: 0.5s; /* Efek halus saat muncul */
  padding-top: 60px;
}

.sidebar a {
  padding: 8px 32px;
  text-decoration: none;
  font-size: 20px;
  color: #818181;
  display: block;
}

.sidebar .closebtn {
  position: absolute;
  top: 0;
  right: 25px;
  font-size: 36px;
}

         <script>function toggleNav() {
  var sidebar = document.getElementById("mySidebar");
  if (sidebar.style.width === "250px") {
